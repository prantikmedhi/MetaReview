<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">MetaReview Architecture Flow</title>
  <desc id="desc">Pull request SQL changes are parsed, enriched with OpenMetadata, scored, written with Gemini, and posted back to GitHub.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="520" rx="0" fill="#f8fafc"/>
  <rect x="48" y="34" width="1084" height="78" rx="10" fill="url(#header)"/>
  <text x="80" y="83" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">MetaReview</text>
  <text x="270" y="82" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Metadata-aware pull request review for SQL changes</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <rect x="70" y="178" width="150" height="96" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="145" y="216" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">Pull Request</text>
    <text x="145" y="244" text-anchor="middle" fill="#475569" font-size="14">SQL diff</text>

    <rect x="275" y="178" width="160" height="96" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="355" y="216" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">GitHub Action</text>
    <text x="355" y="244" text-anchor="middle" fill="#475569" font-size="14">fetch files</text>

    <rect x="490" y="178" width="160" height="96" rx="10" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="570" y="216" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">Parser</text>
    <text x="570" y="244" text-anchor="middle" fill="#475569" font-size="14">tables + columns</text>

    <rect x="720" y="136" width="170" height="86" rx="10" fill="#ffffff" stroke="#86efac"/>
    <text x="805" y="171" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">OpenMetadata</text>
    <text x="805" y="198" text-anchor="middle" fill="#475569" font-size="14">tags + lineage</text>

    <rect x="720" y="274" width="170" height="86" rx="10" fill="#ffffff" stroke="#fed7aa"/>
    <text x="805" y="309" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">Risk Engine</text>
    <text x="805" y="336" text-anchor="middle" fill="#475569" font-size="14">score + findings</text>

    <rect x="955" y="178" width="155" height="96" rx="10" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="1032" y="216" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">PR Comment</text>
    <text x="1032" y="244" text-anchor="middle" fill="#475569" font-size="14">review guidance</text>
  </g>

  <g fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)">
    <path d="M220 226 H270"/>
    <path d="M435 226 H485"/>
    <path d="M650 212 C682 194 684 182 715 179"/>
    <path d="M650 238 C682 268 684 310 715 317"/>
    <path d="M890 317 C924 304 932 264 950 238"/>
  </g>

  <path d="M890 179 C925 188 934 205 950 219" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="88" y="396" width="1004" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="115" y="426" fill="#1e3a8a" font-size="16" font-weight="700">Security boundary</text>
    <text x="115" y="452" fill="#334155" font-size="15">MetaReview reviews pull request text and metadata. It does not run changed SQL, connect to the warehouse, or extract result rows.</text>
  </g>
</svg>
